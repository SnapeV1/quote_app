workflows:
  release-workflow:
    name: DailyLine Full Release
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - github
      vars:
        GRADLE_VERSION: 8.2
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      # ANDROID
      - name: Build APK
        script: flutter build apk --release

      - name: Build AAB
        script: flutter build appbundle --release

      # IOS
      - name: Build Flutter iOS
        script: flutter build ios --release --no-codesign

      - name: Build QuoteWidget
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme QuoteWidget \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath /tmp/widget_build \
            CODE_SIGNING_ALLOWED=NO

      - name: Embed widget
        script: |
          mkdir -p build/ios/iphoneos/Runner.app/PlugIns
          cp -r /tmp/widget_build/Build/Products/Release-iphoneos/QuoteWidget.appex \
            build/ios/iphoneos/Runner.app/PlugIns/

      - name: Package IPA
        script: |
          mkdir -p /tmp/ipa_stage/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/ipa_stage/Payload/
          cd /tmp/ipa_stage
          zip -r "$CM_BUILD_DIR/DailyLine.ipa" Payload

      # 🔥 CREATE GITHUB RELEASE
      - name: Publish to GitHub Releases
        script: |
          TAG="v1.0.${BUILD_NUMBER}"
          gh release create "$TAG" \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/bundle/release/app-release.aab \
            "$CM_BUILD_DIR/DailyLine.ipa" \
            --repo SnapeV1/DailyLine \
            --title "DailyLine $TAG" \
            --notes "🚀 Automated release from Codemagic"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - DailyLine.ipa